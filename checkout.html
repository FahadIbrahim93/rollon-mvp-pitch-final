<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Rollon'</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar"></nav>
    <main class="container page-main">
        <h1 class="page-title">Secure Checkout</h1>
        <div class="checkout-layout">
            <section class="glass-card">
                <h2 style="color: var(--accent-cyan); margin-bottom: 2rem;">Delivery Details</h2>
                <form id="checkout-form" class="form-stack" novalidate>
                    <div>
                        <label for="full-name" style="display: block; color: var(--text-main); font-weight: 600; font-size: 0.9rem; margin-bottom: 0.5rem;">Full Name</label>
                        <input id="full-name" type="text" placeholder="John Doe" required>
                    </div>
                    <div>
                        <label for="phone" style="display: block; color: var(--text-main); font-weight: 600; font-size: 0.9rem; margin-bottom: 0.5rem;">Phone Number</label>
                        <input id="phone" type="tel" placeholder="+880 1XXX-XXXXXX" required>
                    </div>
                    <div>
                        <label for="address" style="display: block; color: var(--text-main); font-weight: 600; font-size: 0.9rem; margin-bottom: 0.5rem;">Delivery Address</label>
                        <textarea id="address" placeholder="Street address, area, Dhaka" required></textarea>
                    </div>
                    <div>
                        <label for="payment-method" style="display: block; color: var(--text-main); font-weight: 600; font-size: 0.9rem; margin-bottom: 0.5rem;">Payment Method</label>
                        <select id="payment-method" required>
                            <option value="">Select payment method</option>
                            <option value="bkash">bKash</option>
                            <option value="nagad">Nagad</option>
                            <option value="card">Debit/Credit Card</option>
                        </select>
                    </div>
                    <button type="submit" class="cta-button primary" style="width: 100%; margin-top: 1.5rem;">Place Order</button>
                </form>
                <p id="checkout-status" aria-live="polite" style="margin-top: 1rem; text-align: center; color: var(--text-muted);"></p>
            </section>
            <section class="glass-card">
                <h2 style="color: var(--accent-cyan); margin-bottom: 1.5rem;">Order Summary</h2>
                <div id="checkout-cart-items" style="margin-bottom: 2rem;"></div>
                <div style="border-top: 1px solid rgba(255, 255, 255, 0.1); padding-top: 1.5rem;">
                    <div style="display: flex; justify-content: space-between; align-items: center; font-size: 1.2rem; font-weight: 700; color: var(--accent-cyan);">
                        <span>Total Amount:</span>
                        <span>৳<span id="checkout-total">0</span></span>
                    </div>
                    <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 1rem;">Delivery free across Dhaka</p>
                </div>
            </section>
        </div>
    </main>
    <script src="js/config.js" defer></script>
    <script src="js/products-data.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/cart.js" defer></script>
    <script src="js/monitoring.js" defer></script>
    <script src="js/app.js" defer></script>
    <script src="js/checkout-page.js" defer></script>
</body>
</html>
